Config { font = "xft:Noto Sans, size = 8"
    , bgColor = "black"
    , fgColor = "grey"
    , position = TopW L 100
    , lowerOnStart = True
    , hideOnStart  = False
    , allDesktops  = True
    , persistent   = True
    , commands = [ Run Network "enp0s3" ["-L","0","-H","32","--normal","green","--high","red"] 10
        , Run Cpu ["-L","3","-H","50","--normal","green","--high","red"] 10
        , Run Memory ["-t","Mem: <usedratio>%"] 10
        , Run Swap [] 10
        , Run Date "%a %b %_d %l:%M" "date" 10
        , Run StdinReader
        ]
    , sepChar = "%"
    , alignSep = "}{"
    , template = "%StdinReader% }{ %cpu% | %memory% * %swap%  %enp0s3% | <fc=#ee9a00>%date%</fc>"
    }
